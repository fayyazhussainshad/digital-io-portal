<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>پیٹرول لاگ — Digital IO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --accent:#38bdf8; --green:#22c55e; --red:#ef4444; --bg:#0a1929; --card:#0d2035; --border:#1e3a5c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Nastaliq Urdu','Arial',sans-serif; background:var(--bg); color:#e0e9f0; min-height:100vh; direction:rtl; }
  .wrap { max-width:520px; margin:0 auto; padding:16px; }
  .header { background:linear-gradient(135deg,#1a3a5c,#0d2a45); border-radius:12px; padding:16px 20px; margin-bottom:16px; text-align:center; }
  .header h1 { font-size:18px; color:#fff; margin-bottom:4px; }
  .header p { font-size:12px; color:rgba(255,255,255,0.6); }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; }
  .label { font-size:12px; color:#8bb8d4; margin-bottom:6px; display:block; }
  input, select, textarea { width:100%; background:#0a1929; border:1px solid var(--border); border-radius:6px; padding:10px 12px; color:#e0e9f0; font-family:'Noto Nastaliq Urdu',Arial,sans-serif; font-size:14px; direction:rtl; margin-bottom:10px; outline:none; }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:80px; }
  .btn { display:inline-block; padding:12px 24px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-family:'Noto Nastaliq Urdu',Arial,sans-serif; font-weight:700; width:100%; margin-top:4px; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-success { background:var(--green); color:#fff; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1e3a5c; border:1px solid var(--accent); color:#e0e9f0; padding:10px 20px; border-radius:8px; font-size:13px; z-index:999; display:none; text-align:center; }
  .entry-card { background:#0d2035; border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:12px; }
  .section-title { font-size:11px; color:var(--accent); font-weight:700; letter-spacing:1px; margin-bottom:10px; text-transform:uppercase; }
  .officer-badge { display:inline-block; background:var(--accent); color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; margin-bottom:8px; }
  .error-msg { text-align:center; padding:40px 20px; color:#8bb8d4; }
  .error-msg .icon { font-size:48px; margin-bottom:12px; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<div class="wrap" id="app">
  <div class="header">
    <div style="font-size:32px;margin-bottom:8px;">🚔</div>
    <h1>پیٹرول لاگ</h1>
    <p>Digital IO — محکمہ پولیس پنجاب</p>
  </div>
  <div class="card" style="text-align:center;"><div id="status-msg" style="color:#8bb8d4;font-size:13px;">⏳ تصدیق ہو رہی ہے...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://bbrhtokynxmljumxyaeh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJicmh0b2t5bnhtbGp1bXh5YWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgwNzM5NzksImV4cCI6MjA2MzY0OTk3OX0.LjTsRRRMW6JCvFXVJa4KhLqDHBrb8L3F9Qu_-PMGVMY';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let _tokenData = null;
let _entries = [];

// Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

async function init() {
  if (!token) { showError('⚠️ غلط لنک — ٹوکن موجود نہیں'); return; }
  try {
    const { data, error } = await supabase.from('patrol_tokens')
      .select('*').eq('token', token).eq('active', true).single();
    if (error || !data) { showError('⚠️ یہ لنک غیر فعال یا غلط ہے'); return; }
    _tokenData = data;
    renderForm();
  } catch(e) { showError('❌ ' + e.message); }
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="header"><h1>پیٹرول لاگ</h1></div>
    <div class="card error-msg">
      <div class="icon">🔒</div>
      <div>${msg}</div>
    </div>`;
}

function renderForm() {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div style="font-size:28px;margin-bottom:6px;">🚔</div>
      <h1>پیٹرول لاگ</h1>
      <p>افسر اندراج فارم</p>
    </div>

    <!-- Officer Info -->
    <div class="card">
      <div class="section-title">افسر کی تفصیل</div>
      <label class="label">مکمل نام *</label>
      <input id="r-name" placeholder="افسر کا نام" required>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <label class="label">رینک</label>
          <select id="r-rank">
            <option>Constable</option><option>HC</option><option>ASI</option>
            <option>SI</option><option>Inspector</option><option>SHO</option>
          </select>
        </div>
        <div>
          <label class="label">بیلٹ نمبر</label>
          <input id="r-belt" placeholder="Belt No" dir="ltr" style="text-align:left;">
        </div>
      </div>
      <label class="label">تھانہ</label>
      <input id="r-station" placeholder="تھانہ کا نام">
      <label class="label">ضلع</label>
      <input id="r-district" placeholder="ضلع">
    </div>

    <!-- Entry -->
    <div class="card">
      <div class="section-title">پیٹرول اندراج</div>
      <label class="label">اندراج کی قسم</label>
      <select id="r-type">
        <option>Call Aai</option><option>Incident</option>
        <option>Patrol Check</option><option>Aur Kuch</option>
      </select>
      <label class="label">مقام / پتہ</label>
      <input id="r-loc" placeholder="گلی، محلہ، موقع">
      <label class="label">تفصیل *</label>
      <textarea id="r-desc" placeholder="کیا ہوا، کیا دیکھا، کیا کاروائی کی..."></textarea>
    </div>

    <!-- Submit -->
    <button class="btn btn-primary" onclick="submitEntry()">💾 اندراج محفوظ کریں</button>

    <!-- Submitted entries -->
    <div id="entries-list" style="margin-top:16px;"></div>`;

  _renderEntries();
}

async function submitEntry() {
  const name = document.getElementById('r-name')?.value.trim();
  const desc = document.getElementById('r-desc')?.value.trim();
  if (!name || !desc) { showToast('⚠️ نام اور تفصیل ضروری ہے'); return; }

  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.textContent = '⏳ محفوظ ہو رہا ہے...'; btn.disabled = true; }

  try {
    await supabase.from('shared_patrol_entries').insert({
      token_id:      _tokenData.id,
      officer_id:    _tokenData.officer_id,
      reporter_name: name,
      reporter_rank: document.getElementById('r-rank')?.value || '',
      reporter_station: document.getElementById('r-station')?.value.trim() || '',
      entry_type:    document.getElementById('r-type')?.value || '',
      notes:         desc,
      address:       document.getElementById('r-loc')?.value.trim() || '',
      submitted_at:  new Date().toISOString(),
    });

    // Save locally too
    _entries.unshift({ reporter_name:name, entry_type:document.getElementById('r-type')?.value, notes:desc, submitted_at:new Date().toISOString() });
    _renderEntries();
    showToast('✅ اندراج محفوظ ہو گیا!');

    // Clear entry fields
    ['r-desc','r-loc'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });

  } catch(e) { showToast('❌ ' + e.message); }
  finally { if (btn) { btn.textContent='💾 اندراج محفوظ کریں'; btn.disabled=false; } }
}

function _renderEntries() {
  const el = document.getElementById('entries-list');
  if (!el || !_entries.length) return;
  el.innerHTML = `<div class="card">
    <div class="section-title">آج کے اندراجات (${_entries.length})</div>
    ${_entries.map(e => `
      <div class="entry-card">
        <div style="font-weight:700;color:var(--accent);">${e.reporter_name} · ${e.entry_type}</div>
        <div style="color:#8bb8d4;font-size:11px;margin-top:4px;">${e.notes}</div>
        <div style="color:#4a7a9b;font-size:10px;margin-top:3px;">${new Date(e.submitted_at).toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>`).join('')}
  </div>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

init();
</script>
</body>
</html>
